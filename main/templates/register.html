{% extends 'base.html' %}
{% load static %}

{% block title %}Create an Account | Indie Bank{% endblock %}
{% block content %}
<div id="register-app" v-cloak>
    <section class="register-section"
        style="padding: var(--spacing-xl) 0; display: flex; justify-content: center; align-items: center; min-height: 90vh; background: url('{% static 'img/image.jpg' %}') center/cover no-repeat; position: relative;">

        <div
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); z-index: 1;">
        </div>
        <div class="register-container glass-panel"
            style="position: relative; z-index: 2; padding: var(--spacing-lg); border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); width: 100%; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); color: white;">
            <div style="text-align: center; margin-bottom: var(--spacing-md);">
                <div
                    style="background: var(--color-ib-blue); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <i class="fas fa-user-plus" style="color: white; font-size: 2rem;"></i>
                </div>
                <h2 style="font-size: 2rem; font-weight: 800;color:white; letter-spacing: -1px;">Join Indie Bank</h2>
                <p style="color: var(--color-text-muted); font-weight: 500;">Empower your financial future today</p>
            </div>

            <transition name="fade">
                <div v-if="Object.keys(errors).length > 0"
                    style="background-color: rgba(229, 62, 62, 0.1); color: #c53030; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; border: 1px solid rgba(229, 62, 62, 0.2);">
                    <div v-for="(errList, field) in errors" :key="field">
                        <div v-for="err in errList" :key="err" style="font-size: 0.85rem; font-weight: 600;">[[ err ]]
                        </div>
                    </div>
                </div>
            </transition>

            <form @submit.prevent="submitRegister">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label
                            style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.75rem; text-transform: uppercase;">First
                            Name</label>
                        <input type="text" v-model="formData.first_name" required
                            style="width: 100%; padding: 0.75rem; border: 2px solid var(--color-border); border-radius: 10px; font-size: 1rem;">
                    </div>
                    <div>
                        <label
                            style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.75rem; text-transform: uppercase;">Last
                            Name</label>
                        <input type="text" v-model="formData.last_name" required
                            style="width: 100%; padding: 0.75rem; border: 2px solid var(--color-border); border-radius: 10px; font-size: 1rem;">
                    </div>
                </div>

                <div style="margin-bottom: 1rem;">
                    <label
                        style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.75rem; text-transform: uppercase;">Desired
                        Username</label>
                    <input type="text" v-model="formData.username" required
                        style="width: 100%; padding: 0.75rem; border: 2px solid var(--color-border); border-radius: 10px; font-size: 1rem;">
                </div>

                <div style="margin-bottom: 1rem;">
                    <label
                        style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.75rem; text-transform: uppercase;">Email
                        Address</label>
                    <input type="email" v-model="formData.email" required
                        style="width: 100%; padding: 0.75rem; border: 2px solid var(--color-border); border-radius: 10px; font-size: 1rem;">
                </div>

                <div style="margin-bottom: 1rem;">
                    <label
                        style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.75rem; text-transform: uppercase;">Password</label>
                    <input type="password" v-model="formData.password" required
                        style="width: 100%; padding: 0.75rem; border: 2px solid var(--color-border); border-radius: 10px; font-size: 1rem;">
                </div>

                <div style="margin-bottom: 2rem;">
                    <label
                        style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.75rem; text-transform: uppercase;">Confirm
                        Password</label>
                    <input type="password" v-model="formData.password_confirm" required
                        style="width: 100%; padding: 0.75rem; border: 2px solid var(--color-border); border-radius: 10px; font-size: 1rem;">
                </div>

                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <button type="submit" :disabled="loading" class="btn btn-primary"
                        style="width: 100%; justify-content: center; padding: 1.25rem; font-size: 1.1rem; border-radius: 12px; font-weight: 700;">
                        <span v-if="!loading">Create My Vault</span>
                        <i v-else class="fas fa-circle-notch fa-spin"></i>
                    </button>

                    <button type="button" @click="resetForm" :disabled="loading" class="btn"
                        style="width: 100%; justify-content: center; padding: 1rem; font-size: 1rem; border-radius: 12px; font-weight: 600; background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; display: flex; align-items: center; gap: 0.5rem;"
                        onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.color='white';"
                        onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.color='#94a3b8';">
                        <i class="fas fa-undo-alt"></i>
                        <span>Reset Details</span>
                    </button>
                </div>

                <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; font-weight: 600;">
                    Already enrolled? <a href="{% url 'login' %}"
                        style="color: var(--color-primary); text-decoration: none;">Login to Base</a>
                </div>
            </form>
        </div>
    </section>
</div>

<style>
    [v-cloak] {
        display: none;
    }

    .fade-enter-active,
    .fade-leave-active {
        transition: opacity 0.3s;
    }

    .fade-enter-from,
    .fade-leave-to {
        opacity: 0;
    }

    input:focus {
        outline: none;
        border-color: var(--color-primary) !important;
    }
</style>

<script>
    const { createApp, ref, reactive } = Vue;

    createApp({
        delimiters: ['[[', ']]'],
        setup() {
            const formData = reactive({
                first_name: '',
                last_name: '',
                username: '',
                email: '',
                password: '',
                password_confirm: ''
            });
            const loading = ref(false);
            const errors = ref({});

            const submitRegister = async () => {
                loading.value = true;
                errors.value = {};
                try {
                    const response = await axios.post('/api/register/', formData, {
                        headers: { 'X-CSRFToken': getCookie('csrftoken') }
                    });
                    alert(response.data.message);
                    window.location.href = '/login/';
                } catch (e) {
                    errors.value = e.response?.data?.error || { general: ['Registration failed. Verification server unreachable.'] };
                } finally {
                    loading.value = false;
                }
            };

            const resetForm = () => {
                formData.first_name = '';
                formData.last_name = '';
                formData.username = '';
                formData.email = '';
                formData.password = '';
                formData.password_confirm = '';
                errors.value = {};
            };

            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }

            return { formData, loading, errors, submitRegister, resetForm };
        }
    }).mount('#register-app');
</script>
<style>
    .form-group input,
    .form-group textarea,
    .form-group select {
        width: 100%;
        padding: 0.8rem 1rem;
        border-radius: 10px;
        border: 1px solid #ddd;
        background: rgba(255, 255, 255, 0.9);
        font-family: inherit;
        font-size: 1rem;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
        outline: none;
        border-color: var(--color-ib-blue);
        box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.1);
    }

    .btn-primary:hover {
        background: var(--color-ib-blue-dark);
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(0, 102, 204, 0.3);
    }
</style>
{% endblock %}
