{% extends 'base.html' %}
{% load static %}

{% block title %}Login | Indie Bank{% endblock %}
{% block content %}
<div id="login-app" v-cloak>
    <section class="login-section"
        style="padding: var(--spacing-xl) 0; display: flex; justify-content: center; align-items: center; min-height: 90vh; background: url('{% static 'img/image.jpg' %}') center/cover no-repeat; position: relative;">

        <div
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); z-index: 1;">
        </div>
        <div class="login-container glass-panel"
            style="position: relative; z-index: 2; padding: var(--spacing-lg); border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); color: white;">
            <div style="text-align: center; margin-bottom: var(--spacing-md);">
                <div
                    style="background: var(--color-primary); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <i class="fas fa-user-circle" style="color: white; font-size: 2rem;"></i>
                </div>
                <h2 style="font-size: 2rem; font-weight: 800;color:white; letter-spacing: -1px;">Access</h2>
                <p style="color: var(--color-text-muted); font-weight: 500;">Welcome back to Indie Bank Command</p>
            </div>

            <transition name="fade">
                <div v-if="error"
                    style="background-color: rgba(229, 62, 62, 0.1); color: #c53030; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; text-align: center; font-weight: 600; border: 1px solid rgba(229, 62, 62, 0.2);">
                    [[ error ]]
                </div>
            </transition>

            <form @submit.prevent="submitLogin">
                {% csrf_token %}
                <div style="margin-bottom: 1.25rem;">
                    <label
                        style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.8rem; text-transform: uppercase; color:white;">ID
                        Name</label>
                    <div style="position: relative;">
                        <i class="fas fa-user"
                            style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); opacity: 0.5;"></i>
                        <input type="text" v-model="username" required
                            style="width: 100%; padding: 1rem 1rem 1rem 2.5rem; border: 2px solid var(--color-border); border-radius: 12px; font-size: 1rem; transition: border-color 0.3s;"
                            placeholder="Enter username">
                    </div>
                </div>
                <div style="margin-bottom: 2rem;">
                    <label
                        style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.8rem; text-transform: uppercase; color:white;">Access
                        Token</label>
                    <div style="position: relative;">
                        <i class="fas fa-key"
                            style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); opacity: 0.5;"></i>
                        <input type="password" v-model="password" required
                            style="width: 100%; padding: 1rem 1rem 1rem 2.5rem; border: 2px solid var(--color-border); border-radius: 12px; font-size: 1rem; transition: border-color 0.3s;"
                            placeholder="Enter password">
                    </div>
                </div>

                <button type="submit" :disabled="loading" class="btn btn-primary"
                    style="width: 100%; justify-content: center; padding: 1.25rem; font-size: 1.1rem; border-radius: 12px; font-weight: 700;">
                    <span v-if="!loading">Initialize Session</span>
                    <i v-else class="fas fa-circle-notch fa-spin"></i>
                </button>

                <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; font-weight: 600;">
                    <a href="{% url 'password_reset' %}" style="color: var(--color-primary); text-decoration: none;">Reset</a>
                    <span style="margin: 0 0.75rem; color: var(--color-border);">|</span>
                    <a href="{% url 'register' %}" style="color: var(--color-primary); text-decoration: none;">Global
                        Registration</a>
                </div>
            </form>
        </div>
    </section>
</div>

<style>
    [v-cloak] {
        display: none;
    }

    .fade-enter-active,
    .fade-leave-active {
        transition: opacity 0.3s;
    }

    .fade-enter-from,
    .fade-leave-to {
        opacity: 0;
    }

    input:focus {
        outline: none;
        border-color: var(--color-primary) !important;
    }
</style>

<script>
    const { createApp, ref } = Vue;

    createApp({
        delimiters: ['[[', ']]'],
        setup() {
            const username = ref('');
            const password = ref('');
            const loading = ref(false);
            const error = ref('');

            const submitLogin = async () => {
                loading.value = true;
                error.value = '';
                try {
                    const response = await axios.post('/api/login/', {
                        username: username.value,
                        password: password.value
                    }, {
                        headers: { 'X-CSRFToken': getCookie('csrftoken') }
                    });

                    if (response.data.is_staff) {
                        window.location.href = '/admin-dashboard/';
                    } else {
                        window.location.href = '/dashboard/';
                    }
                } catch (e) {
                    error.value = e.response?.data?.error || 'Access denied. Credentials rejected by core.';
                } finally {
                    loading.value = false;
                }
            };

            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }

            return { username, password, loading, error, submitLogin };
        }
    }).mount('#login-app');
</script>
{% endblock %}
